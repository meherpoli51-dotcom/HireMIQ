<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" fill="none">
  <!-- Icon mark - larger, more visible -->
  <rect width="80" height="80" rx="16" fill="#1E1B4B"/>

  <!-- Connecting lines (behind dots) -->
  <line x1="26" y1="40" x2="54" y2="40" stroke="#7C6FD4" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="40" y1="26" x2="40" y2="54" stroke="#7C6FD4" stroke-width="2" stroke-opacity="0.7"/>

  <!-- Outer dots -->
  <circle cx="26" cy="40" r="5" fill="#7C6FD4"/>
  <circle cx="54" cy="40" r="5" fill="#7C6FD4"/>
  <circle cx="40" cy="26" r="5" fill="#7C6FD4"/>
  <circle cx="40" cy="54" r="5" fill="#7C6FD4"/>

  <!-- Corner dots -->
  <circle cx="26" cy="26" r="3" fill="#5B4FBF" opacity="0.7"/>
  <circle cx="54" cy="26" r="3" fill="#5B4FBF" opacity="0.7"/>
  <circle cx="26" cy="54" r="3" fill="#5B4FBF" opacity="0.7"/>
  <circle cx="54" cy="54" r="3" fill="#5B4FBF" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="40" cy="40" r="8" fill="#FFFFFF"/>
  <circle cx="40" cy="40" r="4.5" fill="#5B4FBF"/>

  <!-- Wordmark -->
  <text x="96" y="36" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#1E1B4B">Hire<tspan fill="#5B4FBF">MIQ</tspan></text>
  <text x="97" y="56" font-family="Arial, sans-serif" font-size="10.5" font-weight="500" fill="#6B7280" letter-spacing="2.5">RECRUITMENT INTELLIGENCE</text>
</svg>
